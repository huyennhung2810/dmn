<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liên hệ</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      /* Reset & base */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: #ffffff;
        color: #333;
        line-height: 1.6;
      }

      a {
        color: #0052cc;
        text-decoration: none;
        transition: color 0.3s;
      }

      a:hover {
        color: #003d99;
        text-decoration: underline;
      }

      /* Layout wrapper */
      .wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      /* Section title */
      h1 {
        font-size: 38px;
        text-align: center;
        margin-bottom: 10px;
        color: #1a1a1a;
      }

      .container-1 hr {
        margin: 10px auto 30px auto;
        width: 800px;
        border: 1px solid #0052cc;
      }

      /* Flex container for contact */
      .contact-section {
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        justify-content: space-between;
        margin-top: 40px;
      }

      /* Info box */
      .info-box {
        flex: 1 1 45%;
        background-color: #f5f9ff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 1px 3px rgba(0, 82, 204, 0.08);
        transition: box-shadow 0.3s;
      }

      .info-box:hover {
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      }

      .info-box h3 {
        font-size: 24px;
        margin-bottom: 20px;
        color: #0052cc;
        border-bottom: 2px solid #0052cc;
        display: inline-block;
        padding-bottom: 6px;
      }

      .info-box p {
        margin-bottom: 12px;
        color: #444;
      }

      .info-box p strong {
        color: #333;
      }

      /* Contact form */
      .contact-form {
        flex: 1 1 45%;
        background-color: #f5f9ff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 1px 3px rgba(0, 82, 204, 0.08);
        transition: box-shadow 0.3s;
      }

      .contact-form:hover {
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      }

      .contact-form h3 {
        font-size: 24px;
        margin-bottom: 20px;
        color: #0052cc;
        border-bottom: 2px solid #0052cc;
        display: inline-block;
        padding-bottom: 6px;
      }

      .contact-form form {
        display: flex;
        flex-direction: column;
      }

      /* Form group styling */
      .form-group {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        font-size: 14px;
        font-weight: 600;
        color: #0052cc;
        margin-bottom: 8px;
        display: block;
      }

      .form-group-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .form-group-icon {
        position: absolute;
        left: 14px;
        color: #0052cc;
        font-size: 16px;
        pointer-events: none;
        z-index: 1;
      }

      .contact-form input,
      .contact-form textarea {
        padding: 14px 14px 14px 45px;
        font-size: 15px;
        border: 2px solid #e0e7ff;
        border-radius: 8px;
        background: #ffffff;
        transition: all 0.3s ease;
        font-family: inherit;
        width: 100%;
      }

      .contact-form textarea {
        padding: 14px;
        resize: vertical;
        min-height: 120px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .contact-form input::placeholder,
      .contact-form textarea::placeholder {
        color: #999;
      }

      .contact-form input:focus,
      .contact-form textarea:focus {
        border-color: #0052cc;
        background-color: #ffffff;
        outline: none;
        box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.1);
      }

      .contact-form button {
        padding: 14px 32px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
        color: #fff;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(0, 82, 204, 0.2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        align-self: flex-start;
      }

      .contact-form button:hover {
        background: linear-gradient(135deg, #003d99 0%, #002966 100%);
        box-shadow: 0 4px 16px rgba(0, 82, 204, 0.3);
        transform: translateY(-2px);
      }

      .contact-form button:active {
        transform: translateY(0);
        box-shadow: 0 2px 8px rgba(0, 82, 204, 0.2);
      }

      /* Map section */
      .map {
        margin-top: 50px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .map iframe {
        width: 100%;
        height: 450px;
        border: none;
      }

      /* Responsive design */
      @media (max-width: 768px) {
        .contact-section {
          flex-direction: column;
          gap: 20px;
        }

        .info-box,
        .contact-form {
          flex: 1 1 100%;
        }

        .contact-form h3,
        .info-box h3 {
          font-size: 20px;
        }

        .form-group {
          margin-bottom: 16px;
        }

        .contact-form input,
        .contact-form textarea {
          font-size: 14px;
          padding: 12px 12px 12px 40px;
        }

        .form-group-icon {
          font-size: 14px;
          left: 12px;
        }

        .contact-form button {
          width: 100%;
          padding: 12px 20px;
        }

        h1 {
          font-size: 28px;
        }

        .wrapper {
          padding: 20px 15px;
        }
      }

      @media (max-width: 480px) {
        .contact-section {
          gap: 15px;
        }

        h1 {
          font-size: 22px;
          margin-bottom: 5px;
        }

        .info-box,
        .contact-form {
          padding: 20px;
          border-radius: 8px;
        }

        .contact-form h3,
        .info-box h3 {
          font-size: 18px;
          margin-bottom: 15px;
        }

        .info-box p {
          font-size: 14px;
        }

        .form-group label {
          font-size: 13px;
          margin-bottom: 6px;
        }

        .form-group {
          margin-bottom: 14px;
        }

        .contact-form input,
        .contact-form textarea {
          font-size: 14px;
          padding: 11px 11px 11px 38px;
        }

        .contact-form textarea {
          min-height: 100px;
        }

        .form-group-icon {
          font-size: 13px;
        }

        .contact-form button {
          font-size: 14px;
          padding: 11px 16px;
        }

        .map iframe {
          height: 300px;
        }

        .wrapper {
          padding: 15px 10px;
        }
      }
    </style>
  </head>
  <body>
    <div id="header"></div>
    <div id="nav"></div>

    <div class="wrapper">
      <div class="container-1">
        <div class="open">
          <h1>Liên hệ</h1>
          <hr />
          <br />
        </div>

        <div class="contact-section">
          <!-- Thông tin bên trái -->
          <div class="info-box">
            <h3>Thông tin liên hệ</h3>
            <p><strong>Đá mỹ nghệ Thu Huyền</strong></p>
            <p>
              <strong>Địa chỉ:</strong> Tổ dân phố Đồng Quan, Phường Nam Hoa Lư,
              Ninh Bình
            </p>
            <p>
              <strong>Hotline:</strong>
              <a href="tel:0982683221">0982 683 221</a>
            </p>
            <p>
              <strong>Email:</strong>
              <a href="mailto:damynghehuyenthu@gmail.com"
                >damynghehuyenthu@gmail.com</a
              >
            </p>
            <p>
              <strong>Website:</strong>
              <a href="http://thuhuyen.com" target="_blank">thuhuyen.com</a>
            </p>
            <p>
              <strong>Facebook:</strong>
              <a href="http://facebook.com/thuhuyen" target="_blank"
                >facebook.com/thuhuyen</a
              >
            </p>
          </div>

          <!-- Form liên hệ -->
          <div class="contact-form">
            <h3>Tư vấn</h3>
            <form>
              <div class="form-group">
                <label for="name"
                  >Họ tên <span style="color: #ff6b6b">*</span></label
                >
                <div class="form-group-wrapper">
                  <i class="fas fa-user form-group-icon"></i>
                  <input
                    type="text"
                    id="name"
                    placeholder="Nhập họ tên của bạn"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label for="email"
                  >Email <span style="color: #ff6b6b">*</span></label
                >
                <div class="form-group-wrapper">
                  <i class="fas fa-envelope form-group-icon"></i>
                  <input
                    type="email"
                    id="email"
                    placeholder="Nhập email của bạn"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <div class="form-group-wrapper">
                  <i class="fas fa-phone form-group-icon"></i>
                  <input
                    type="tel"
                    id="phone"
                    placeholder="Nhập số điện thoại"
                  />
                </div>
              </div>

              <div class="form-group">
                <label for="message"
                  >Nội dung <span style="color: #ff6b6b">*</span></label
                >
                <textarea
                  id="message"
                  placeholder="Nhập nội dung của bạn..."
                  required
                ></textarea>
              </div>

              <button type="submit">
                <i class="fas fa-paper-plane"></i> Gửi Liên Hệ
              </button>
            </form>
          </div>
        </div>

        <div class="map">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d1872.234077538041!2d105.95148176917269!3d20.197858100648826!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31367b004318ba75%3A0xdc8a4b07c494c233!2zQ8ahIHPhu58gxJHDoSBt4bu5IG5naOG7hyBUaHUgSHV54buBbg!5e0!3m2!1svi!2sus!4v1759389406951!5m2!1svi!2sus"
            width="600"
            height="450"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      </div>
    </div>

    <div id="footer"></div>
    <script src="/main.js"></script>
  </body>
</html>
